# ---------- HTTP → HTTPS redirect + ACME challenge ----------
server {
    listen 80;
    server_name aitest.qefmoodle.com;

    # Let's Encrypt verification
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------- HTTPS ----------
server {
    listen 443 ssl;
    server_name aitest.qefmoodle.com;

    ssl_certificate     /etc/letsencrypt/live/aitest.qefmoodle.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aitest.qefmoodle.com/privkey.pem;

    # Modern TLS settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Use Docker's embedded DNS so the `app` service name re-resolves
    # to all replica container IPs (round-robin load balancing).
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Proxy all /aitools requests to the Next.js container(s)
    location /aitools {
        # Variable proxy_pass forces DNS re-resolution at request time,
        # which is required for `docker compose --scale app=N` to work.
        set $backend "http://app:3000";
        proxy_pass $backend;
        proxy_http_version 1.1;

        # WebSocket / streaming support (SSE for AI chat)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Increase timeouts for streaming AI responses
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
    }

    # Root returns 404
    location / {
        return 404;
    }
}
