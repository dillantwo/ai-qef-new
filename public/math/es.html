<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FractionApp15(Expanding&Simplifying)</title>

<script>
        // Disable right-click
        document.addEventListener('contextmenu', event => event.preventDefault());

        // Disable keyboard shortcuts
        document.onkeydown = function(e) {
        // 123 = F12
        if (e.keyCode === 123) {
        return false;
        }
        // Ctrl+Shift+I (DevTools), Ctrl+Shift+J (Console), Ctrl+U (Source)
        if (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) {
        return false;
        }
        // Ctrl+S (Save), Ctrl+U (Source), Ctrl+C (Copy)
        if (e.ctrlKey && (e.keyCode === 67 || e.keyCode === 85 || e.keyCode === 83)) {
        return false;
        }
    };
 </script>

    <style>
        /* 將 --accent 從橘色改為對比度更高的紫色 (#8e44ad)，避免與黃色擴分按鈕混淆 */
        :root { --primary: #3498db; --accent: #8e44ad; --success: #27ae60; --red: #e74c3c; --gray: #95a5a6; --grid-dark: #333; --yellow: #eeb015; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'PingFang HK', 'Microsoft JhengHei', 'Noto Sans TC', sans-serif; background: linear-gradient(135deg, #e0f7fa 0%, #fff9c4 100%); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { background: white; padding: 1.5rem; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); max-width: 850px; width: 100%; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 12px; flex-wrap: wrap; gap: 10px; }
        .title-badge { color: #1565c0; font-weight: bold; font-size: 1.3rem; }
        
        .lang-toggle { display: flex; gap: 8px; }
        .lang-btn { padding: 6px 16px; border: 2px solid var(--gray); background: white; color: var(--gray); border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.9rem; transition: 0.15s ease-out; box-shadow: 0 3px 0 var(--gray); transform: translateY(0); }
        .lang-btn:disabled { background: var(--gray); color: white; box-shadow: 0 0 0 var(--gray); transform: translateY(3px); cursor: default; opacity: 1; }

        .control-panel { display: flex; justify-content: center; gap: 15px; margin-bottom: 25px; position: relative; z-index: 10; }
        .action-btn { width: 140px; padding: 12px; border-radius: 12px; border: 2px solid transparent; cursor: pointer; font-size: 1.2rem; font-weight: bold; transition: 0.15s ease-out; background: white; transform: translateY(0); }
        .btn-merge { border-color: var(--success); color: var(--success); box-shadow: 0 6px 0 var(--success); }
        .btn-merge:disabled { background: var(--success); color: white; box-shadow: 0 0 0 var(--success); transform: translateY(6px); opacity: 1; cursor: default; }
        .btn-slice { border-color: var(--yellow); color: var(--yellow); box-shadow: 0 6px 0 var(--yellow); }
        .btn-slice:disabled { background: var(--yellow); color: white; box-shadow: 0 0 0 var(--yellow); transform: translateY(6px); opacity: 1; cursor: default; }

        .math-engine { display: flex; align-items: center; justify-content: center; gap: 10px; margin: 15px 0; padding: 25px 15px 15px 15px; border-radius: 20px; background: #fdfdfd; border: 2px solid #eee; flex-wrap: wrap; }
        .fraction-box { display: flex; flex-direction: column; align-items: center; width: 92px; flex-shrink: 0; }
        .fraction-input { width: 100%; padding: 8px 5px; text-align: center; font-size: 1.8rem; border: 3px solid #34495e; border-radius: 12px; font-weight: bold; background: white; box-sizing: border-box; }
        .fraction-input[readonly] { border-color: transparent; background: transparent; font-size: 2rem; pointer-events: none; }
        
        .num-input { color: var(--primary); } 
        .den-input { color: var(--grid-dark); } 
        .num-target { color: var(--accent); } 
        .fraction-line { width: 100%; height: 5px; background: var(--grid-dark); margin: 8px 0; border-radius: 3px; }
        .eq-sign { font-size: 2.5rem; font-weight: bold; color: #ccc; flex-shrink: 0; }
        
        .process-container { border: 3px dashed var(--gray); padding: 15px; border-radius: 20px; background: #fffcf0; display: flex; flex-direction: column; align-items: center; flex-grow: 1; min-width: 250px; box-sizing: border-box; }
        .row-align { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; margin: 5px 0; }
        .base-num { font-size: 2rem; font-weight: bold; text-align: center; width: 58px; flex-shrink: 0; }
        
        .op-select { display: flex; align-items: center; justify-content: center; font-size: 1.8rem; font-weight: 900; border: 3px solid #ccc; color: #888; border-radius: 8px; width: 65px; height: 50px; background: white; box-sizing: border-box; user-select: none; }
        .factor-in { font-size: 1.8rem; font-weight: bold; border: 3px solid #ccc; color: #888; border-radius: 12px; width: 80px; text-align: center; height: 50px; background: white; box-sizing: border-box; transition: 0.3s; }
        
        #error_msg { color: var(--red); font-size: 0.9rem; text-align: center; min-height: 1.2rem; margin-top: -10px; margin-bottom: 10px; font-weight: bold; width: 100%; }

        .visual-stack { width: 100%; display: flex; flex-direction: column; gap: 20px; margin-bottom: 20px; }
        .bar-label { font-weight: bold; margin-bottom: 5px; font-size: 1.1rem; display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
        .bar-container { height: 70px; background: #eee; border-radius: 12px; position: relative; overflow: hidden; border: 2px solid var(--grid-dark); }
        .bar-fill { height: 100%; transition: width 0.4s ease; position: absolute; z-index: 1; opacity: 0.8; }
        
        .grid-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; z-index: 2; pointer-events: none; }
        .segment { flex: 1; }
        .divider-thick { flex: 0 0 3px; background: var(--grid-dark); z-index: 3; }
        .divider-thin { flex: 0 0 1px; position: relative; z-index: 3; }
        .divider-thin .anim-line { position: absolute; top: 0; left: 0; width: 100%; transition: height 0.8s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.5s; }

        .question-banner { display: none; background: #e3f2fd; border-radius: 14px; padding: 14px 20px; margin-bottom: 20px; text-align: center; border: 2px solid #bbdefb; }
        .question-banner.show { display: block; }
        .question-banner .q-label { font-size: 0.85rem; color: #666; margin-bottom: 6px; }
        .question-banner .q-equation { display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 1.6rem; font-weight: bold; color: #1565c0; }
        .question-banner .q-frac { display: inline-flex; flex-direction: column; align-items: center; line-height: 1.1; }
        .question-banner .q-frac .q-num { padding: 2px 8px; }
        .question-banner .q-frac .q-line { width: 100%; height: 3px; background: #1565c0; border-radius: 2px; }
        .question-banner .q-frac .q-den { padding: 2px 8px; }
        .question-banner .q-blank { color: var(--accent); background: #f3e5f5; border: 2px dashed var(--accent); border-radius: 6px; padding: 0 10px; min-width: 36px; text-align: center; }

        /* 嵌入 iframe 時隱藏標題列，讓外層 dashboard 顯示工具名 */
        body.embedded .header { display: none; }
        body.embedded { background: transparent; padding: 15px; min-height: auto; }
        body.embedded .container { box-shadow: none; border-radius: 0; padding: 1rem; }

        @media (max-width: 600px) {
            .container { padding: 1rem; }
            .title-badge { font-size: 1.1rem; }
            .header { margin-bottom: 15px; }
            .math-engine { padding: 20px 8px 8px 8px; gap: 3px; }
            .fraction-box { width: 62px; }
            .fraction-input { font-size: 1.3rem; padding: 4px 2px; border-width: 2px; }
            .fraction-input[readonly] { font-size: 1.6rem; }
            .eq-sign { font-size: 1.5rem; margin: 0 2px; }
            .process-container { min-width: auto; padding: 8px; flex-grow: 1; }
            .base-num { font-size: 1.3rem; width: 30px; }
            .op-select, .factor-in { width: 45px; height: 35px; font-size: 1.3rem; padding: 0;}
            .bar-container { height: 50px; }
            .bar-label { font-size: 1rem; }
            .action-btn { width: 110px; font-size: 1.1rem; padding: 10px; }
            .lang-btn { padding: 6px 14px; font-size: 0.85rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="title-badge" id="title_text">分數擴分與約分</div>
        <div class="lang-toggle">
            <button id="btn_zh" class="lang-btn" onclick="setLang('zh')">中文</button>
            <button id="btn_en" class="lang-btn" onclick="setLang('en')">EN</button>
        </div>
    </div>

    <div class="question-banner" id="question_banner">
        <div class="q-label" id="q_label">題目</div>
        <div class="q-equation" id="q_equation"></div>
    </div>

    <div class="control-panel">
        <button id="btn_merge" class="action-btn btn-merge" onclick="setMode('/')">約分</button>
        <button id="btn_slice" class="action-btn btn-slice" onclick="setMode('*')">擴分</button>
    </div>

    <div class="math-engine" id="engine">
        <div class="fraction-box">
            <input type="number" id="n_start" class="fraction-input num-input" value="2" min="1" max="100" inputmode="numeric" 
                   onkeypress="return event.charCode >= 48 && event.charCode <= 57" oninput="manualInputChange()" onblur="checkEmpty(this, 2)">
            <div class="fraction-line"></div>
            <input type="number" id="d_start" class="fraction-input den-input" value="8" min="1" max="100" inputmode="numeric" 
                   onkeypress="return event.charCode >= 48 && event.charCode <= 57" oninput="manualInputChange()" onblur="checkEmpty(this, 8)">
        </div>

        <div class="eq-sign">=</div>

        <div class="process-container">
            <div class="row-align">
                <div id="ln" class="base-num num-input">2</div>
                <div id="on" class="op-select">×</div>
                <span id="factor_container_n">
                    <input type="number" id="fn" class="factor-in" value="1" min="1" max="20" inputmode="numeric" 
                           onkeypress="return event.charCode >= 48 && event.charCode <= 57" oninput="manualFactorChange(this.value)" onblur="checkEmpty(this, 1)">
                </span>
            </div>
            <div class="fraction-line" style="margin: 10px 0; background: #ddd; height: 3px;"></div>
            <div class="row-align">
                <div id="ld" class="base-num den-input">8</div>
                <div id="od" class="op-select">×</div>
                <span id="factor_container_d">
                    <input type="number" id="fd" class="factor-in" value="1" min="1" max="20" inputmode="numeric" 
                           onkeypress="return event.charCode >= 48 && event.charCode <= 57" oninput="manualFactorChange(this.value)" onblur="checkEmpty(this, 1)">
                </span>
            </div>
        </div>

        <div class="eq-sign">=</div>

        <div class="fraction-box">
            <input type="text" id="n_target" class="fraction-input num-target" readonly tabindex="-1">
            <div class="fraction-line"></div>
            <input type="text" id="d_target" class="fraction-input den-input" readonly tabindex="-1">
        </div>
    </div>
    
    <div id="error_msg"></div>

    <div class="visual-stack">
        <div>
            <div class="bar-label" style="color:var(--primary)">
                <span id="label_original">原分數</span>
            </div>
            <div class="bar-container" style="border-color: var(--primary);">
                <div id="bar_original" class="bar-fill" style="background: var(--primary); opacity: 0.6;"></div>
                <div id="grid_original"></div> 
            </div>
        </div>

        <div>
            <div class="bar-label" style="color:var(--accent)">
                <span id="label_result">運算結果</span>
            </div>
            <div class="bar-container" style="border-color: var(--accent);">
                <div id="bar_process" class="bar-fill" style="background: var(--accent); opacity: 0.8;"></div>
                <div id="grid_process"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const isAnim = true;
    const LIMITS = { den_start: 100, expand_factor: 20 };
    let currentLang = 'zh';
    let currentOp = '*'; 

    let targetNum = null;  // 目標分子（null 表示空格）
    let targetDen = null;  // 目標分母（null 表示空格）

    const i18n = {
        zh: {
            title: "分數擴分與約分",
            original: "原分數",
            result: "運算結果",
            simplify: "約分",
            expand: "擴分",
            error: "⚠️ 錯誤：分子或分母不能被 {f} 整除",
            question: "題目",
            fillBlank: "在空格內填上正確的數字"
        },
        en: {
            title: "Fraction Expanding & Simplifying",
            original: "Original Fraction",
            result: "Result",
            simplify: "Simplify",
            expand: "Expand",
            error: "⚠️ Error: Numerator or denominator cannot be divided by {f}",
            question: "Question",
            fillBlank: "Fill in the correct number"
        }
    };

    function renderQuestionBanner() {
        const banner = document.getElementById('question_banner');
        if (targetNum === null && targetDen === null) { banner.classList.remove('show'); return; }

        const n = parseInt(document.getElementById('n_start').value) || 0;
        const d = parseInt(document.getElementById('d_start').value) || 1;
        const lang = i18n[currentLang];

        document.getElementById('q_label').innerText = lang.fillBlank;

        const tNumHtml = targetNum !== null ? targetNum : '<span class="q-blank">?</span>';
        const tDenHtml = targetDen !== null ? targetDen : '<span class="q-blank">?</span>';

        document.getElementById('q_equation').innerHTML = 
            '<span class="q-frac"><span class="q-num">' + n + '</span><span class="q-line"></span><span class="q-den">' + d + '</span></span>' +
            '<span>=</span>' +
            '<span class="q-frac"><span class="q-num">' + tNumHtml + '</span><span class="q-line"></span><span class="q-den">' + tDenHtml + '</span></span>';

        banner.classList.add('show');
    }

    function setLang(lang) {
        currentLang = lang;
        document.getElementById('btn_zh').disabled = (lang === 'zh');
        document.getElementById('btn_en').disabled = (lang === 'en');
        
        document.getElementById('title_text').innerText = i18n[lang].title;
        document.getElementById('label_original').innerText = i18n[lang].original;
        document.getElementById('label_result').innerText = i18n[lang].result;
        document.getElementById('btn_merge').innerText = i18n[lang].simplify;
        document.getElementById('btn_slice').innerText = i18n[lang].expand;
        
        renderQuestionBanner();
        renderEverything(false);
    }

    function setMode(op) {
        currentOp = op;
        const symbol = (op === '*') ? '×' : '÷';
        document.getElementById('on').innerText = symbol;
        document.getElementById('od').innerText = symbol;
        
        document.getElementById('fn').value = 1;
        document.getElementById('fd').value = 1;
        
        const btnMerge = document.getElementById('btn_merge');
        const btnSlice = document.getElementById('btn_slice');
        
        if (op === '/') {
            btnMerge.disabled = true;
            btnSlice.disabled = false;
        } else {
            btnSlice.disabled = true;
            btnMerge.disabled = false;
        }
        
        syncOpColor(op, 1);
        renderEverything(true);
    }

    function checkEmpty(el, defaultVal) {
        if (el.value === "" || isNaN(el.value)) {
            el.value = defaultVal;
            if(el.id === 'fn' || el.id === 'fd') manualFactorChange(defaultVal);
            else manualInputChange();
        }
    }

    function manualInputChange() {
        let n = parseInt(document.getElementById('n_start').value);
        let d = parseInt(document.getElementById('d_start').value);
        
        if (isNaN(d)) return; 
        if (isNaN(n)) return;

        if (d > LIMITS.den_start) d = LIMITS.den_start;
        if (d < 1) d = 1;
        
        if (n > d) n = d; 
        if (n < 0) n = 0;

        document.getElementById('n_start').value = n;
        document.getElementById('d_start').value = d;

        drawOriginal(n, d);
        renderEverything(true);
    }

    function manualFactorChange(v) {
        if (v === "") return; 
        
        let val = parseInt(v) || 1;
        if(val < 1) val = 1;

        const maxLimit = currentOp === '*' ? LIMITS.expand_factor : LIMITS.den_start;
        if(val > maxLimit) val = maxLimit;

        const fnEl = document.getElementById('fn');
        const fdEl = document.getElementById('fd');
        if (fnEl) fnEl.value = val;
        if (fdEl) fdEl.value = val;

        syncOpColor(currentOp, val);
        renderEverything(true); 
    }

    function syncOpColor(op, f) {
        let themeColor = f === 1 ? '#ccc' : (op === '*' ? 'var(--yellow)' : 'var(--success)');
        document.querySelectorAll('.op-select, .factor-in').forEach(el => {
            el.style.borderColor = themeColor;
            el.style.color = f === 1 ? '#888' : themeColor;
        });
    }

    function renderEverything(anim) {
        const n1 = parseInt(document.getElementById('n_start').value) || 2;
        const d1 = parseInt(document.getElementById('d_start').value) || 8;
        const elF = document.getElementById('fn');
        const f = elF && elF.value !== "" ? parseInt(elF.value) : 1;
        
        document.getElementById('ln').innerText = n1;
        document.getElementById('ld').innerText = d1;
        const errorEl = document.getElementById('error_msg');
        errorEl.innerText = "";

        let isValid = true;
        if(currentOp === '/') {
            if(f === 0) { isValid = false; }
            else if(n1 % f !== 0 || d1 % f !== 0) {
                errorEl.innerText = i18n[currentLang].error.replace('{f}', f); 
                isValid = false;
            }
        }

        let n2 = isValid ? ((currentOp === '*') ? n1 * f : n1 / f) : "?";
        let d2 = isValid ? ((currentOp === '*') ? d1 * f : d1 / f) : "?";
        
        document.getElementById('n_target').value = n2;
        document.getElementById('d_target').value = d2;

        if(isValid) {
            drawProcess(n1, d1, n2, d2, f, currentOp, anim);
        } else {
            document.getElementById('bar_process').style.width = '0%';
            document.getElementById('grid_process').innerHTML = '';
        }
    }

    function drawOriginal(n, d) {
        document.getElementById('bar_original').style.width = (n / d * 100) + '%';
        let html = '<div class="grid-overlay">';
        for(let i=1; i <= d; i++) {
            html += `<div class="segment"></div>`;
            if (i < d) html += `<div class="divider-thick"></div>`;
        }
        html += '</div>';
        document.getElementById('grid_original').innerHTML = html;
    }

    function drawProcess(n1, d1, n2, d2, factor, op, anim) {
        const b = document.getElementById('bar_process');
        const g = document.getElementById('grid_process');
        b.style.width = (n2 / d2 * 100) + '%';
        
        let html = '<div class="grid-overlay">';
        const maxGrid = (op === '*') ? d2 : d1; 

        for(let i=1; i <= maxGrid; i++) {
            html += `<div class="segment"></div>`;

            if (i < maxGrid) {
                const isMainLine = (i % factor === 0 && op === '/') || (op === '*' && i % factor === 0);

                if (op === '*') {
                    if (isMainLine || factor === 1) {
                        html += `<div class="divider-thick"></div>`;
                    } else {
                        const hS = anim ? '0%' : '100%';
                        html += `<div class="divider-thin"><div class="anim-line" style="height:${hS}; background: var(--accent);"></div></div>`;
                    }
                } else {
                    if (factor === 1) {
                        html += `<div class="divider-thick"></div>`;
                    } else if (isMainLine) {
                        html += `<div class="divider-thick"></div>`;
                    } else {
                        const hS = anim ? '100%' : '0%';
                        html += `<div class="divider-thin"><div class="anim-line" style="height:${hS}; background: var(--grid-dark);"></div></div>`;
                    }
                }
            }
        }
        html += '</div>';
        g.innerHTML = html;

        if (anim && factor !== 1) {
            setTimeout(() => {
                const lines = g.querySelectorAll('.anim-line');
                lines.forEach(l => {
                    l.style.height = (op === '*') ? '100%' : '0%';
                    if(op === '*') setTimeout(() => l.style.background = 'var(--grid-dark)', 600); 
                });
            }, 50);
        }
    }

    window.onload = function() {
        // 偵測是否在 iframe 中嵌入，若是則進入嵌入模式
        try { if (window.self !== window.top) document.body.classList.add('embedded'); } catch(e) { document.body.classList.add('embedded'); }

        setLang('zh'); // 預設為中文

        // 讀取 URL 參數，讓 AI 可以透過參數設定題目
        const urlParams = new URLSearchParams(window.location.search);
        const pNum = parseInt(urlParams.get('numerator'));
        const pDen = parseInt(urlParams.get('denominator'));
        const pMode = urlParams.get('mode'); // "expand" or "simplify"
        const pTargetNum = urlParams.get('targetNum');
        const pTargetDen = urlParams.get('targetDen');

        // 設定目標值（用於題目顯示）
        if (pTargetNum !== null && pTargetNum !== '') targetNum = parseInt(pTargetNum);
        if (pTargetDen !== null && pTargetDen !== '') targetDen = parseInt(pTargetDen);

        if (!isNaN(pNum) && !isNaN(pDen) && pDen >= 1) {
            document.getElementById('n_start').value = Math.min(pNum, pDen);
            document.getElementById('d_start').value = Math.min(pDen, LIMITS.den_start);
        }

        if (pMode === 'simplify') {
            setMode('/');
        } else {
            setMode('*');
        }

        renderQuestionBanner();
        manualInputChange();

        // 也支援 postMessage 方式傳參數
        window.addEventListener('message', function(e) {
            if (e.data && e.data.type === 'set-params') {
                const p = e.data.params;
                if (p.targetNum !== undefined) targetNum = p.targetNum;
                if (p.targetDen !== undefined) targetDen = p.targetDen;
                if (p.numerator != null && p.denominator != null) {
                    document.getElementById('n_start').value = Math.min(p.numerator, p.denominator);
                    document.getElementById('d_start').value = Math.min(p.denominator, LIMITS.den_start);
                }
                if (p.mode === 'simplify') setMode('/');
                else setMode('*');
                renderQuestionBanner();
                manualInputChange();
            }
        });
    };
</script>
</body>
</html>
